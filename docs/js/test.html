<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamburger Menu with Alpine.js + Tailwind CSS</title>
    <!-- 1. Include Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. Include Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 p-4">
    <!-- The Alpine Component: x-data holds the state (menu open or closed) -->
    <nav x-data="{ isOpen: false }" class="bg-white shadow-md rounded-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <!-- Logo/Brand -->
            <div class="text-xl font-bold text-gray-800">
                My Site
            </div>

            <!-- Desktop Menu (hidden on mobile, visible on large screens) -->
            <div class="hidden md:flex space-x-6">
                <a href="#" class="text-gray-600 hover:text-gray-900">Home</a>
                <a href="#" class="text-gray-600 hover:text-gray-900">About</a>
                <a href="#" class="text-gray-600 hover:text-gray-900">Services</a>
                <a href="#" class="text-gray-600 hover:text-gray-900">Contact</a>
            </div>

            <!-- Hamburger Button for Mobile -->
            <!-- @click toggles the 'isOpen' state -->
            <button @click="isOpen = !isOpen" class="md:hidden focus:outline-none">
                <!-- This SVG is the hamburger icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>

        <!-- Mobile Menu Panel -->
        <!-- x-show="isOpen" automatically shows/hides this panel based on the state -->
        <div x-show="isOpen" x-transition.duration.300ms class="md:hidden bg-white pb-4 px-4 flex flex-col space-y-3">
            <a href="#" class="text-gray-600 hover:text-gray-900 block py-2">Home</a>
            <a href="#" class="text-gray-600 hover:text-gray-900 block py-2">About</a>
            <a href="#" class="text-gray-600 hover:text-gray-900 block py-2">Services</a>
            <a href="#" class="text-gray-600 hover:text-gray-900 block py-2">Contact</a>
        </div>
    </nav>

    <!-- Your page content goes here -->
    <main class="container mx-auto mt-8 p-4">
        <h1 class="text-2xl font-semibold">Your Page Content</h1>
        <p class="mt-2 text-gray-600">Resize your browser window to see the hamburger menu on mobile screens.</p>
    </main>
</body>

</html>
